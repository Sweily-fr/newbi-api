# Schéma GraphQL pour l'envoi de documents par email

type EmailTracking {
  emailSentAt: String
  emailOpenedAt: String
  emailOpenCount: Int
  emailClickedAt: String
  emailClickCount: Int
}

input EmailAttachmentInput {
  filename: String!
  content: String!
  contentType: String
}

input SendDocumentEmailInput {
  documentId: ID!
  emailSubject: String!
  emailBody: String!
  recipientEmail: String!
  ccEmails: [String]
  bccEmails: [String]
  pdfBase64: String
  attachments: [EmailAttachmentInput!]
}

type SendDocumentEmailResult {
  success: Boolean!
  messageId: String
  recipientEmail: String!
}

type EmailTrackingUpdate {
  documentId: ID!
  documentType: String!
  workspaceId: ID!
  emailTracking: EmailTracking!
}

extend type Mutation {
  sendInvoiceEmail(workspaceId: ID!, input: SendDocumentEmailInput!): SendDocumentEmailResult!
  sendQuoteEmail(workspaceId: ID!, input: SendDocumentEmailInput!): SendDocumentEmailResult!
  sendCreditNoteEmail(workspaceId: ID!, input: SendDocumentEmailInput!): SendDocumentEmailResult!
  sendPurchaseOrderEmail(workspaceId: ID!, input: SendDocumentEmailInput!): SendDocumentEmailResult!
}

extend type Subscription {
  emailTrackingUpdated(workspaceId: ID!): EmailTrackingUpdate!
}
