# Types pour le rapprochement factures/transactions bancaires

type ReconciliationSuggestion {
  transaction: ReconciliationTransaction!
  matchingInvoices: [ReconciliationInvoice!]!
  confidence: ReconciliationConfidence!
}

type ReconciliationTransaction {
  id: ID!
  amount: Float!
  description: String
  date: DateTime
  reconciliationStatus: String
  score: Int
}

type ReconciliationInvoice {
  id: ID!
  number: String
  clientName: String
  totalTTC: Float
  dueDate: DateTime
  status: String
  # "INVOICE" (facture standard) ou "IMPORTED_INVOICE" (facture de CA importée),
  # pour router le clic "Rattacher" vers la bonne mutation côté front.
  documentType: String
}

type ReconciliationSuggestionsResponse {
  success: Boolean!
  suggestions: [ReconciliationSuggestion!]!
  unmatchedCount: Int!
  pendingInvoicesCount: Int!
}

type TransactionsForInvoiceResponse {
  success: Boolean!
  transactions: [ReconciliationTransaction!]!
  invoiceAmount: Float!
}

# transaction renvoie le type Transaction complet (et non ReconciliationTransaction)
# pour qu'Apollo normalise l'entité par id côté front (même __typename) et mette à
# jour la liste sans refetch réseau.
type ReconciliationLinkResponse {
  success: Boolean!
  message: String
  transaction: Transaction
  invoice: ReconciliationInvoice
}

type ReconciliationUnlinkResponse {
  success: Boolean!
  message: String
  transaction: Transaction
}

type ReconciliationIgnoreResponse {
  success: Boolean!
  message: String
}

# Enums
enum ReconciliationConfidence {
  high
  medium
  low
}

# Inputs
input ReconciliationLinkInput {
  transactionId: ID!
  invoiceId: ID!
}

input ReconciliationUnlinkInput {
  transactionId: ID
  invoiceId: ID
}

input ReconciliationIgnoreInput {
  transactionId: ID!
}

# Inputs dédiés aux factures de CA importées (ImportedInvoice)
input ImportedInvoiceReconciliationLinkInput {
  transactionId: ID!
  importedInvoiceId: ID!
}

input ImportedInvoiceReconciliationUnlinkInput {
  transactionId: ID
  importedInvoiceId: ID
}

# Queries
extend type Query {
  # Suggestions de rapprochement
  reconciliationSuggestions(
    workspaceId: ID!
  ): ReconciliationSuggestionsResponse!

  # Transactions pour une facture spécifique
  transactionsForInvoice(invoiceId: ID!): TransactionsForInvoiceResponse!

  # Transactions candidates pour une facture de CA importée
  transactionsForImportedInvoice(
    importedInvoiceId: ID!
  ): TransactionsForInvoiceResponse!
}

# Mutations
extend type Mutation {
  # Lier une transaction à une facture
  linkTransactionToInvoice(
    input: ReconciliationLinkInput!
  ): ReconciliationLinkResponse!

  # Délier une transaction d'une facture
  unlinkTransactionFromInvoice(
    input: ReconciliationUnlinkInput!
  ): ReconciliationUnlinkResponse!

  # Ignorer une transaction (ne plus la suggérer)
  ignoreTransaction(
    input: ReconciliationIgnoreInput!
  ): ReconciliationIgnoreResponse!

  # Lier une transaction à une facture de CA importée
  linkTransactionToImportedInvoice(
    input: ImportedInvoiceReconciliationLinkInput!
  ): ReconciliationLinkResponse!

  # Délier une transaction d'une facture de CA importée
  unlinkTransactionFromImportedInvoice(
    input: ImportedInvoiceReconciliationUnlinkInput!
  ): ReconciliationUnlinkResponse!
}
