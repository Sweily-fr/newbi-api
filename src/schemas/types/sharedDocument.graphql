# Types pour les documents partagés

type SharedDocument {
  id: ID!
  name: String!
  originalName: String!
  description: String
  fileUrl: String!
  fileKey: String!
  mimeType: String!
  fileSize: Int!
  fileExtension: String
  fileHash: String
  workspaceId: ID!
  folderId: ID
  folder: SharedFolder
  uploadedBy: ID!
  uploadedByName: String
  status: SharedDocumentStatus!
  isSharedWithAccountant: Boolean!
  tags: [String]
  comments: [DocumentComment]
  createdAt: String!
  updatedAt: String!
  archivedAt: String
  # Corbeille
  trashedAt: String
  originalFolderId: ID
  daysUntilPermanentDeletion: Int
}

type SharedFolder {
  id: ID!
  name: String!
  description: String
  workspaceId: ID!
  parentId: ID
  parent: SharedFolder
  color: String!
  icon: String!
  createdBy: ID!
  isSharedWithAccountant: Boolean!
  order: Float!
  isSystem: Boolean!
  visibility: FolderVisibility
  allowedUserIds: [ID]
  canManageVisibility: Boolean
  documentsCount: Int
  createdAt: String!
  updatedAt: String!
  # Corbeille
  trashedAt: String
  originalParentId: ID
  daysUntilPermanentDeletion: Int
}

type DocumentComment {
  text: String!
  authorId: ID!
  authorName: String
  createdAt: String!
}

# Tag réutilisable du registre (par workspace)
type SharedTag {
  id: ID!
  name: String!
  color: String!
  # Nombre de documents utilisant ce tag (calculé à la lecture)
  usageCount: Int!
  createdAt: String
  updatedAt: String
}

enum SharedDocumentStatus {
  pending
  classified
  archived
}

enum FolderVisibility {
  public
  private
}

# Réponses
type SharedDocumentResponse {
  success: Boolean!
  message: String
  document: SharedDocument
}

type SharedDocumentsResponse {
  success: Boolean!
  message: String
  documents: [SharedDocument]
  total: Int
  hasMore: Boolean
}

type SharedFolderResponse {
  success: Boolean!
  message: String
  folder: SharedFolder
}

type SharedFoldersResponse {
  success: Boolean!
  message: String
  folders: [SharedFolder]
}

type DeleteResponse {
  success: Boolean!
  message: String
}

type MoveDocumentsResponse {
  success: Boolean!
  message: String
  movedCount: Int
}

type BulkTagsResponse {
  success: Boolean!
  message: String
  updatedCount: Int
}

type SharedTagResponse {
  success: Boolean!
  message: String
  tag: SharedTag
}

type SharedTagsResponse {
  success: Boolean!
  message: String
  tags: [SharedTag]
}

# Inputs
input CreateSharedFolderInput {
  name: String!
  description: String
  parentId: ID
  color: String
  icon: String
  isSharedWithAccountant: Boolean
  isSystem: Boolean
  visibility: FolderVisibility
  allowedUserIds: [ID]
}

input UpdateSharedFolderInput {
  name: String
  description: String
  parentId: ID
  color: String
  icon: String
  isSharedWithAccountant: Boolean
  order: Float
  visibility: FolderVisibility
  allowedUserIds: [ID]
}

input UpdateSharedDocumentInput {
  name: String
  description: String
  folderId: ID
  status: SharedDocumentStatus
  isSharedWithAccountant: Boolean
  tags: [String]
}

input AddDocumentCommentInput {
  documentId: ID!
  text: String!
}

input SharedDocumentsFilterInput {
  folderId: ID
  status: SharedDocumentStatus
  search: String
  tags: [String]
  # Filtres avancés
  fileType: String # "image", "video", "pdf", "document", "spreadsheet", "other"
  dateFrom: String # ISO date string
  dateTo: String # ISO date string
  minSize: Int # en bytes
  maxSize: Int # en bytes
}

# Queries
extend type Query {
  # Documents
  sharedDocuments(
    workspaceId: ID!
    filter: SharedDocumentsFilterInput
    limit: Int
    offset: Int
    sortBy: String
    sortOrder: String
  ): SharedDocumentsResponse!

  sharedDocument(id: ID!, workspaceId: ID!): SharedDocumentResponse!

  # Dossiers
  sharedFolders(workspaceId: ID!): SharedFoldersResponse!
  sharedFolder(id: ID!, workspaceId: ID!): SharedFolderResponse!

  # Stats
  sharedDocumentsStats(workspaceId: ID!): SharedDocumentsStatsResponse!

  # Registre de tags (avec nombre d'utilisations)
  documentTags(workspaceId: ID!): SharedTagsResponse!

  # Corbeille
  trashItems(workspaceId: ID!): TrashItemsResponse!
}

type SharedDocumentsStatsResponse {
  success: Boolean!
  totalDocuments: Int!
  pendingDocuments: Int!
  classifiedDocuments: Int!
  archivedDocuments: Int!
  totalFolders: Int!
  totalSize: Float!
  # Stats corbeille
  trashedDocuments: Int!
  trashedFolders: Int!
  trashedSize: Float!
}

# Réponse pour les éléments de la corbeille
type TrashItemsResponse {
  success: Boolean!
  message: String
  documents: [SharedDocument]
  folders: [SharedFolder]
  totalDocuments: Int
  totalFolders: Int
  totalSize: Float
}

type RestoreResponse {
  success: Boolean!
  message: String
  restoredDocuments: Int
  restoredFolders: Int
}

# Mutations
extend type Mutation {
  # Documents
  uploadSharedDocument(
    workspaceId: ID!
    file: Upload!
    folderId: ID
    name: String
    description: String
    tags: [String]
  ): SharedDocumentResponse!

  updateSharedDocument(
    id: ID!
    workspaceId: ID!
    input: UpdateSharedDocumentInput!
  ): SharedDocumentResponse!

  deleteSharedDocument(id: ID!, workspaceId: ID!): DeleteResponse!

  deleteSharedDocuments(ids: [ID!]!, workspaceId: ID!): DeleteResponse!

  moveSharedDocuments(
    ids: [ID!]!
    workspaceId: ID!
    targetFolderId: ID
  ): MoveDocumentsResponse!

  addDocumentComment(
    workspaceId: ID!
    input: AddDocumentCommentInput!
  ): SharedDocumentResponse!

  # Dossiers
  createSharedFolder(
    workspaceId: ID!
    input: CreateSharedFolderInput!
  ): SharedFolderResponse!

  updateSharedFolder(
    id: ID!
    workspaceId: ID!
    input: UpdateSharedFolderInput!
  ): SharedFolderResponse!

  deleteSharedFolder(id: ID!, workspaceId: ID!): DeleteResponse!

  updateFolderVisibility(
    id: ID!
    workspaceId: ID!
    visibility: FolderVisibility!
    allowedUserIds: [ID]
  ): SharedFolderResponse!

  # Tags en masse
  bulkUpdateTags(
    ids: [ID!]!
    workspaceId: ID!
    addTags: [String]
    removeTags: [String]
  ): BulkTagsResponse!

  # Registre de tags
  createDocumentTag(
    workspaceId: ID!
    name: String!
    color: String
  ): SharedTagResponse!

  # Renomme et/ou recolore un tag. Le renommage est propagé sur tous les documents.
  updateDocumentTag(
    workspaceId: ID!
    id: ID!
    name: String
    color: String
  ): SharedTagResponse!

  # Supprime un tag du registre et le retire de tous les documents.
  deleteDocumentTag(workspaceId: ID!, id: ID!): DeleteResponse!

  # Corbeille
  restoreFromTrash(
    workspaceId: ID!
    documentIds: [ID]
    folderIds: [ID]
  ): RestoreResponse!

  emptyTrash(workspaceId: ID!): DeleteResponse!

  permanentlyDeleteDocuments(ids: [ID!]!, workspaceId: ID!): DeleteResponse!
  permanentlyDeleteFolders(ids: [ID!]!, workspaceId: ID!): DeleteResponse!
}

# Notification temps réel : un document/dossier du workspace a changé
# (upload, déplacement, suppression, ou classement automatique via automatisation).
# Les clients abonnés rafraîchissent alors leurs listes.
type SharedDocumentsChangedPayload {
  type: String!
  documentId: ID
  workspaceId: ID!
}

extend type Subscription {
  sharedDocumentsChanged(workspaceId: ID!): SharedDocumentsChangedPayload!
}
