# Importe les types communs
# Note: GraphQL n'a pas de directive d'importation native,
# mais la fusion des schémas gère cela pour nous

type Invoice {
  id: ID!
  number: String!
  prefix: String
  purchaseOrderNumber: String
  isDeposit: Boolean!
  invoiceType: String
  situationNumber: Int
  situationReference: String
  client: EmbeddedClient!
  companyInfo: Company!
  items: [Item!]!
  status: InvoiceStatus!
  issueDate: String!
  dueDate: String!
  paymentDate: String
  headerNotes: String
  footerNotes: String
  termsAndConditions: String
  termsAndConditionsLinkTitle: String
  termsAndConditionsLink: String
  discount: Float
  discountType: DiscountType
  retenueGarantie: Float
  escompte: Float
  totalHT: Float!
  totalTTC: Float!
  totalVAT: Float!
  finalTotalHT: Float!
  finalTotalVAT: Float
  finalTotalTTC: Float!
  customFields: [CustomField!]
  discountAmount: Float
  showBankDetails: Boolean
  appearance: Appearance
  shipping: Shipping
  isReverseCharge: Boolean
  clientPositionRight: Boolean
  operationType: String
  createdBy: User!
  stripeInvoiceId: String
  linkedTransactionId: ID
  # E-Invoicing SuperPDP
  superPdpInvoiceId: String
  eInvoiceStatus: String
  eInvoiceSentAt: String
  eInvoiceLastCode: String
  eInvoiceEvents: [EInvoiceEvent!]
  archivedPdfUrl: String
  archivedPdfKey: String
  archivedPdfStoredAt: String
  archivedPdfSource: String
  eInvoiceError: String
  facturXData: FacturXData
  # Routing e-invoicing
  eInvoiceFlowType: String
  eInvoiceFlowReason: String
  # E-reporting (B2C / international / paiements)
  eReportingStatus: String
  eReportingPaymentStatus: String
  eReportingError: String
  # Email tracking
  emailTracking: EmailTracking
  createdAt: String!
  updatedAt: String!
}

type FacturXData {
  xmlGenerated: Boolean
  profile: String
  generatedAt: String
}

# Événement brut du cycle de vie SuperPDP (code api:* / fr:* / ppf:*)
type EInvoiceEvent {
  code: String
  label: String
  occurredAt: String
}

# Entreprise SuperPDP connectée (companies/me)
type EInvoicingCompany {
  formalName: String
  tradeName: String
  number: String
  numberScheme: String
  vatRegime: String
  env: String
}

# Statut de vérification KYC/KYB de la session OAuth SuperPDP.
# Tant que companyVerificationStatus != "verified", l'émission/réception est bloquée (403).
type EInvoicingVerification {
  connected: Boolean!
  companyVerificationStatus: String
  userIdentityVerificationStatus: String
  company: EInvoicingCompany
  error: String
}

# Entrée d'annuaire (peppol|ppf) pour pouvoir recevoir des factures
type EInvoicingDirectoryEntry {
  id: Int
  directory: String
  identifier: String
  status: String
  statusMessage: String
  effectiveDate: String
}

# Déclaration e-reporting transmise au PPF
type EInvoicingEReporting {
  id: Int
  kind: String
  startPeriod: String
  endPeriod: String
}

type InvoicePagination {
  invoices: [Invoice!]!
  totalCount: Int!
  hasNextPage: Boolean!
}

type LinkedInvoiceResult {
  invoice: Invoice!
  quote: Quote!
}

input CreateInvoiceInput {
  isDeposit: Boolean
  invoiceType: String
  situationNumber: Int
  client: ClientInput!
  companyInfo: CompanyInput
  items: [ItemInput!]!
  status: InvoiceStatus = DRAFT
  issueDate: String!
  dueDate: String!
  headerNotes: String
  footerNotes: String
  termsAndConditions: String
  termsAndConditionsLinkTitle: String
  termsAndConditionsLink: String
  discount: Float
  discountType: DiscountType
  retenueGarantie: Float
  escompte: Float
  customFields: [CustomFieldInput!]
  number: String
  prefix: String
  purchaseOrderNumber: String
  situationReference: String
  contractTotal: Float
  showBankDetails: Boolean
  bankDetails: BankDetailsInput
  appearance: AppearanceInput
  shipping: ShippingInput
  isReverseCharge: Boolean
  clientPositionRight: Boolean
  operationType: String
  sourcePurchaseOrderId: ID
  sourceQuoteId: ID
}

input UpdateInvoiceInput {
  isDeposit: Boolean
  invoiceType: String
  situationNumber: Int
  client: ClientInput
  companyInfo: CompanyInput
  items: [ItemInput!]
  status: InvoiceStatus
  issueDate: String
  dueDate: String
  headerNotes: String
  footerNotes: String
  termsAndConditions: String
  termsAndConditionsLinkTitle: String
  termsAndConditionsLink: String
  discount: Float
  discountType: DiscountType
  retenueGarantie: Float
  escompte: Float
  customFields: [CustomFieldInput!]
  number: String
  prefix: String
  purchaseOrderNumber: String
  situationReference: String
  contractTotal: Float
  showBankDetails: Boolean
  bankDetails: BankDetailsInput
  appearance: AppearanceInput
  shipping: ShippingInput
  isReverseCharge: Boolean
  clientPositionRight: Boolean
  operationType: String
}

extend type Query {
  invoice(id: ID!, workspaceId: ID!): Invoice!
  invoices(
    workspaceId: ID!
    startDate: String
    endDate: String
    status: InvoiceStatus
    search: String
    page: Int
    limit: Int
  ): InvoicePagination!
  invoiceStats(workspaceId: ID!): InvoiceStats!
  invoiceBalances(workspaceId: ID!): InvoiceBalances!
  nextInvoiceNumber(workspaceId: ID!, prefix: String, isDraft: Boolean, autoNumbering: Boolean): String!
  latestInvoiceIssueDate(workspaceId: ID!): String
  situationInvoicesByQuoteRef(
    workspaceId: ID!
    purchaseOrderNumber: String!
  ): [Invoice!]!
  situationReferences(workspaceId: ID!, search: String): [SituationReference!]!
  checkInvoiceNumberExists(workspaceId: ID!, number: String!, prefix: String!, excludeId: ID): Boolean!
  # URL signée (R2 ou copie SuperPDP) pour afficher le PDF Factur-X d'une facture.
  # Renvoie null pour les brouillons (preview client live) ou si aucun document n'est disponible.
  invoiceDocumentUrl(workspaceId: ID!, invoiceId: ID!): String
  # Statut de vérification KYC/KYB + entreprise SuperPDP connectée
  eInvoicingVerification(workspaceId: ID!): EInvoicingVerification!
  # Entrées d'annuaire de l'entreprise (réception de factures)
  eInvoicingDirectoryEntries(workspaceId: ID!): [EInvoicingDirectoryEntry!]!
  # Historique des déclarations e-reporting transmises au PPF
  eInvoicingEReportings(workspaceId: ID!): [EInvoicingEReporting!]!
}

type SituationReference {
  reference: String!
  count: Int!
  lastInvoiceDate: String
  totalTTC: Float
  contractTotal: Float
}

extend type Mutation {
  createInvoice(workspaceId: ID!, input: CreateInvoiceInput!): Invoice!
  updateInvoice(id: ID!, workspaceId: ID!, input: UpdateInvoiceInput!): Invoice!
  deleteInvoice(id: ID!, workspaceId: ID!): Boolean!
  sendInvoice(id: ID!, workspaceId: ID!, email: String!): Boolean!
  markInvoiceAsPaid(id: ID!, workspaceId: ID!, paymentDate: String!): Invoice!
  changeInvoiceStatus(
    id: ID!
    workspaceId: ID!
    status: InvoiceStatus!
  ): Invoice!
  createLinkedInvoice(
    quoteId: ID!
    workspaceId: ID!
    amount: Float!
    isDeposit: Boolean!
  ): LinkedInvoiceResult!
  deleteLinkedInvoice(id: ID!, workspaceId: ID!): Boolean!
  # Archive le PDF Factur-X (généré côté frontend) d'une facture non-brouillon sur Cloudflare R2.
  archiveInvoicePdf(workspaceId: ID!, invoiceId: ID!, file: Upload!): Invoice!
  # Inscrit l'entreprise dans les annuaires Peppol + PPF (pour recevoir des factures).
  registerEInvoicingDirectory(workspaceId: ID!): [EInvoicingDirectoryEntry!]!
  # Met à jour le régime TVA SuperPDP (pilote le calendrier d'envoi e-reporting au PPF).
  updateEInvoicingVatRegime(workspaceId: ID!, vatRegime: String!): Boolean!
}
