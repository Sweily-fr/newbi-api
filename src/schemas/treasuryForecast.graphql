enum ForecastType {
  INCOME
  EXPENSE
}

enum ForecastCategory {
  SALES
  REFUNDS_RECEIVED
  OTHER_INCOME
  RENT
  SUBSCRIPTIONS
  OFFICE_SUPPLIES
  SERVICES
  TRANSPORT
  MEALS
  TELECOMMUNICATIONS
  INSURANCE
  ENERGY
  SOFTWARE
  HARDWARE
  MARKETING
  TRAINING
  MAINTENANCE
  TAXES
  UTILITIES
  SALARIES
  OTHER_EXPENSE
}

type TreasuryForecast {
  id: ID!
  workspaceId: ID!
  month: String!
  category: ForecastCategory!
  type: ForecastType!
  forecastAmount: Float!
  notes: String
  createdBy: ID
  createdAt: String
  updatedAt: String
}

type TreasuryKPI {
  currentBalance: Float!
  projectedBalance3Months: Float!
  pendingReceivables: Float!
  pendingPayables: Float!
  signedQuotes: Float!
}

type CategoryMonthAmount {
  category: ForecastCategory!
  type: ForecastType!
  actualAmount: Float!
  forecastAmount: Float!
}

type TreasuryMonthData {
  month: String!
  actualIncome: Float!
  actualExpense: Float!
  forecastIncome: Float!
  forecastExpense: Float!
  openingBalance: Float!
  closingBalance: Float!
  categoryBreakdown: [CategoryMonthAmount!]!
}

type TreasuryForecastData {
  kpi: TreasuryKPI!
  months: [TreasuryMonthData!]!
}

type TreasuryDeleteResult {
  success: Boolean!
  message: String
}

enum CashflowFrequency {
  ONCE
  WEEKLY
  MONTHLY
  QUARTERLY
  SEMIANNUAL
  ANNUAL
}

# « Augmenter ou diminuer de » : EUR fixe ou pourcentage composé,
# appliqué à chaque occurrence de la récurrence.
enum AmountDeltaType {
  AMOUNT
  PERCENT
}

type ManualCashflowEntry {
  id: ID!
  workspaceId: ID!
  name: String!
  type: ForecastType!
  category: ForecastCategory
  amount: Float!
  amountDelta: Float
  amountDeltaType: AmountDeltaType
  startDate: String!
  endDate: String
  frequency: CashflowFrequency!
  notes: String
  # Mois (YYYY-MM) dont l'occurrence a été supprimée individuellement.
  excludedMonths: [String!]
  createdBy: ID
  createdAt: String
  updatedAt: String
}

input UpsertManualCashflowEntryInput {
  id: ID
  workspaceId: ID
  name: String!
  type: ForecastType!
  category: ForecastCategory
  amount: Float!
  amountDelta: Float
  amountDeltaType: AmountDeltaType
  startDate: String!
  endDate: String
  frequency: CashflowFrequency!
  notes: String
}

enum RecurrenceSource {
  PURCHASE_INVOICE
  INVOICE
  TRANSACTION
}

enum RecurrenceFrequency {
  WEEKLY
  BIWEEKLY
  MONTHLY
  QUARTERLY
  SEMIANNUAL
  ANNUAL
}

type DetectedRecurrence {
  id: ID!
  workspaceId: ID!
  source: RecurrenceSource!
  type: ForecastType!
  partyName: String!
  category: String
  averageAmount: Float!
  frequency: RecurrenceFrequency
  intervalDays: Int
  occurrenceCount: Int
  lastSeenMonth: String!
  consecutiveMonths: Int!
  isActive: Boolean!
  isMuted: Boolean!
  # Mois (YYYY-MM) dont l'occurrence projetée a été supprimée individuellement.
  excludedMonths: [String!]
  lastDetectedAt: String
}

input UpsertTreasuryForecastInput {
  workspaceId: ID
  month: String!
  category: ForecastCategory!
  type: ForecastType!
  forecastAmount: Float!
  notes: String
}

type ForecastScenario {
  id: ID!
  workspaceId: ID!
  name: String!
  incomeMultiplier: Float!
  expenseMultiplier: Float!
  createdAt: String
  updatedAt: String
}

input UpsertForecastScenarioInput {
  id: ID
  workspaceId: ID
  name: String!
  incomeMultiplier: Float!
  expenseMultiplier: Float!
}

extend type Query {
  treasuryForecastData(
    workspaceId: ID
    startDate: String!
    endDate: String!
    accountId: ID
    scenarioId: ID
  ): TreasuryForecastData!

  forecastScenarios(workspaceId: ID): [ForecastScenario!]!

  treasuryForecasts(
    workspaceId: ID
    startMonth: String!
    endMonth: String!
  ): [TreasuryForecast!]!

  manualCashflowEntries(workspaceId: ID): [ManualCashflowEntry!]!

  detectedRecurrences(workspaceId: ID): [DetectedRecurrence!]!

  # Détails des factures/devis composant un mois donné (format YYYY-MM).
  forecastMonthDetails(
    workspaceId: ID
    month: String!
  ): ForecastMonthDetails!

  # Liste à plat des occurrences de prévision (saisies manuelles + récurrences
  # détectées) entre deux mois (format YYYY-MM), triées chronologiquement.
  forecastOccurrences(
    workspaceId: ID
    startMonth: String!
    endMonth: String!
  ): [ForecastEntryItem!]!
}

enum ForecastOccurrenceKind {
  MANUAL
  DETECTED
}

# Une occurrence de prévision adressable individuellement (suppression par mois).
type ForecastEntryItem {
  id: ID!
  kind: ForecastOccurrenceKind!
  name: String!
  category: String
  type: ForecastType!
  amount: Float!
  date: String!
}

type ForecastInvoiceItem {
  id: ID!
  number: String
  partyName: String!
  amountTTC: Float!
  issueDate: String!
  status: String!
  kind: String!
}

type ForecastBankTransactionItem {
  id: ID!
  description: String!
  amount: Float!
  date: String!
  category: String
}

type ForecastMonthDetails {
  month: String!
  invoices: [ForecastInvoiceItem!]!
  purchaseInvoices: [ForecastInvoiceItem!]!
  signedQuotes: [ForecastInvoiceItem!]!
  bankTransactions: [ForecastBankTransactionItem!]!
  # Prévisions du mois (vide pour un mois passé).
  forecastEntries: [ForecastEntryItem!]!
}

extend type Mutation {
  upsertTreasuryForecast(input: UpsertTreasuryForecastInput!): TreasuryForecast!
  deleteTreasuryForecast(id: ID!): TreasuryDeleteResult!

  upsertManualCashflowEntry(
    input: UpsertManualCashflowEntryInput!
  ): ManualCashflowEntry!
  deleteManualCashflowEntry(id: ID!): TreasuryDeleteResult!

  muteDetectedRecurrence(id: ID!, muted: Boolean!): DetectedRecurrence!

  # Supprime définitivement une récurrence détectée. Elle pourra réapparaître
  # à la prochaine analyse si le motif persiste (utiliser le mute pour la
  # masquer durablement).
  deleteDetectedRecurrence(id: ID!): TreasuryDeleteResult!

  # Lance la détection des récurrences immédiatement pour le workspace courant
  # (utile pour tester sans attendre le cron mensuel).
  runRecurrenceDetection(workspaceId: ID): Int!

  # Supprime une seule occurrence (un mois) d'une prévision récurrente sans
  # affecter les autres mois (ajoute le mois à excludedMonths).
  excludeForecastOccurrence(
    kind: ForecastOccurrenceKind!
    id: ID!
    month: String!
  ): Boolean!

  upsertForecastScenario(input: UpsertForecastScenarioInput!): ForecastScenario!
  deleteForecastScenario(id: ID!): TreasuryDeleteResult!
}
